{% extends 'base.html' %}

{% block title %}Login - Aura Books{% endblock %}

{% block content %}
<div class="glass auth-box">
    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'store:signup' %}" style="color: var(--primary); font-weight: 600;">Sign up</a>
    </p>
</div>
{% endblock %}
