{% extends 'base.html' %}

{% block title %}Checkout - Aura Books{% endblock %}

{% block content %}
<div class="glass auth-box" style="max-width: 600px;">
    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; text-align: center;">Checkout</h2>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Total amount: <strong>₹{{ total }}</strong></p>
    
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="address">Shipping Address</label>
            <input type="text" id="address" name="address" class="form-control" required>
        </div>

        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="city">City</label>
                <input type="text" id="city" name="city" class="form-control" required>
            </div>
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="zip_code">Zip Code</label>
                <input type="text" id="zip_code" name="zip_code" class="form-control" required>
            </div>
        </div>

        <hr style="margin: 2rem 0; border: none; border-top: 1px solid var(--surface-border);">
        <h3 style="font-weight: 700; margin-bottom: 1rem;">Payment Information (Mock)</h3>
        
        <div class="form-group">
            <label class="form-label" for="cc_name">Name on Card</label>
            <input type="text" id="cc_name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label class="form-label" for="cc_number">Card Number</label>
            <input type="text" id="cc_number" class="form-control" placeholder="0000 0000 0000 0000" maxlength="19" required>
        </div>
        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="cc_expiry">Expiry (MM/YY)</label>
                <input type="text" id="cc_expiry" class="form-control" placeholder="12/25" maxlength="5" required>
            </div>
            <div class="form-group" style="flex: 1; margin: 0;">
                <label class="form-label" for="cc_cvv">CVV</label>
                <input type="password" id="cc_cvv" class="form-control" placeholder="123" maxlength="3" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary" onclick="this.innerHTML='Processing... 💳'; this.style.opacity='0.8'" style="width: 100%; justify-content: center; margin-top: 1.5rem;">Pay ₹{{ total }} securely</button>
    </form>
</div>
{% endblock %}
